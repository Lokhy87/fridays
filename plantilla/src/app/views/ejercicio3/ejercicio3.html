<div class="content">
    <section>
        <h1 (click)="showAllCards()" style="cursor: pointer; user-select: none;">Ejercicio 3</h1>
    </section>
    
    <section>
        <div class="elementor-grid-3">
            <div class="container elementor-grid">
                
                @if (selectedPokemon) {
                    <app-poke-card 
                        [pokemon]="selectedPokemon"
                        (selectPokemon)="handleSelectPokemon($event)">
                    </app-poke-card>
                } @else {
                    @for (poke of pokemonList; track poke.id) {
                        <app-poke-card 
                            [pokemon]="poke"
                            (selectPokemon)="handleSelectPokemon($event)">
                        </app-poke-card>
                    }
                }

            </div>
        </div>
    </section>
</div>

@if (showModal && selectedPokemon) {
    <app-modal 
        [pokemon]="selectedPokemon"
        (closeModal)="handleCloseModal()">
    </app-modal>
}
